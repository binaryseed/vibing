<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>same person? · kylie × vince</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --bg2: #141414;
    --bg3: #1a1a1a;
    --border: #333;
    --border2: #3a3a3a;
    --text: #e8e0d0;
    --text2: #aaa;
    --text3: #666;
    --vc: #e8643a;
    --kc: #4a9eff;
    --oc: #a78bfa;
    --font-mono: 'DM Mono', monospace;
    --font-serif: 'Playfair Display', serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    overflow: hidden;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 14px;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  header h1 {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    color: var(--text);
  }

  header .subtitle {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    letter-spacing: 3px;
  }

  #sync-status {
    position: absolute;
    right: 24px;
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    transition: color 0.3s;
  }

  #sync-status.syncing { color: var(--oc); }
  #sync-status.saved { color: #4a9e6a; }
  #sync-status.error { color: #e8643a; }

  /* COLUMNS */
  #columns {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  .col {
    display: flex;
    flex-direction: column;
    min-height: 0;
    border-right: 1px solid var(--border);
  }

  .col:last-child { border-right: none; }

  #col-similarity { width: 240px; flex-shrink: 0; }
  #col-interest   { width: 300px; flex-shrink: 0; }
  #col-results    { flex: 1; min-width: 0; }

  .col-header {
    padding: 12px 16px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .col-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
  }

  .col-body {
    flex: 1;
    overflow-y: auto;
    padding: 14px 16px;
  }

  .col-footer {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  /* INPUTS & BUTTONS */
  input[type=text] {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 5px;
    color: var(--text);
    padding: 7px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type=text]:focus { border-color: var(--oc); }

  button.add-btn {
    width: 100%;
    padding: 7px 0;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: 5px;
    color: var(--text2);
    font-family: var(--font-mono);
    font-size: 10px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  button.add-btn:hover { border-color: var(--oc); color: var(--oc); }

  input[type=range] {
    flex: 1;
    min-width: 0;
    height: 3px;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
    background: var(--border2);
    border-radius: 2px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--slider-color, var(--oc));
    border: none;
    cursor: pointer;
  }

  input[type=range]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--slider-color, var(--oc));
    border: none;
    cursor: pointer;
  }

  /* TOPIC CARDS */
  .topic-card {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .topic-card:last-child { border-bottom: none; }

  .topic-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .topic-name {
    font-family: var(--font-serif);
    font-size: 14px;
    color: var(--text);
  }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    transition: color 0.15s;
  }

  .remove-btn:hover { color: var(--text2); }

  canvas.mini {
    width: 100%;
    display: block;
    margin-bottom: 8px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 7px;
    margin-bottom: 3px;
  }

  .slider-label {
    font-size: 10px;
    width: 38px;
    flex-shrink: 0;
  }

  .slider-val {
    font-size: 10px;
    width: 22px;
    text-align: right;
    color: var(--text2);
    flex-shrink: 0;
  }

  .score-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 2px;
  }

  .score-val {
    font-size: 10px;
    color: var(--oc);
  }

  /* RESULTS */
  #col-results .col-body {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 32px 32px 16px;
  }

  .chart-wrap {
    position: relative;
    width: 100%;
    height: 50vh;
  }

  .chart-axis-labels {
    display: flex;
    justify-content: space-between;
    padding-top: 8px;
  }

  .chart-axis-labels span {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
    letter-spacing: 2px;
  }


  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="subtitle">KYLIE × VINCE</span>
    <h1>same person?</h1>
    <span id="sync-status">···</span>
  </header>

  <div id="columns">

    <!-- SIMILARITY -->
    <div class="col" id="col-similarity">
      <div class="col-header"><span class="col-label">SIMILARITY</span></div>
      <div class="col-body" id="simList"></div>
      <div class="col-footer">
        <input type="text" id="newSim" placeholder="add topic..." />
        <button class="add-btn" onclick="addTopic('similarity')">+ similarity</button>
      </div>
    </div>

    <!-- INTEREST -->
    <div class="col" id="col-interest">
      <div class="col-header"><span class="col-label">INTEREST</span></div>
      <div class="col-body" id="intList"></div>
      <div class="col-footer">
        <input type="text" id="newInt" placeholder="add topic..." />
        <button class="add-btn" onclick="addTopic('interest')">+ interest</button>
      </div>
    </div>

    <!-- RESULTS -->
    <div class="col" id="col-results">
      <div class="col-header"><span class="col-label">RESULTS</span></div>
      <div class="col-body">
        <div class="chart-wrap">
          <canvas id="sumChart"></canvas>
        </div>
        <div class="chart-axis-labels">
          <span>OPPOSITE</span>
          <span>EXACT</span>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const BIN_ID = '69b63927aa77b81da9e6a798';
const ACCESS_KEY = '$2a$10$KQydW7NSXIx/hzbwTKwCG.4zVOnVQRCrZ7DZbwH87faAeZMR16/Ui';
const BIN_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

const VC='#e8643a', KC='#4a9eff', OC='#a78bfa';
const SIGMA=0.22, SUM_SIGMA=0.06, SIM_SUM_SIGMA=0.15;

let state = {
  topics: [
    {name:'Music', type:'interest'},
    {name:'Food', type:'interest'},
    {name:'Outdoors', type:'similarity'},
    {name:'Travel', type:'interest'},
    {name:'Movies', type:'similarity'}
  ],
  curves: {}
};

let sumChart = null;
let saveTimer = null;
let vizTimer = null;

// ── Math ──────────────────────────────────────────────────────────────
function interestScore(a, b) {
  const c = Math.cos(Math.abs(a - b) * Math.PI / 2);
  return c * c;
}

function gauss(x, mean, sigma) {
  return Math.exp(-0.5 * Math.pow((x - mean) / sigma, 2));
}

function genPts(mean, sigma, n=100) {
  const m = Math.max(0, Math.min(1, mean));
  return Array.from({length: n}, (_, i) => gauss(i/(n-1), m, sigma));
}

function esc(s) { return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function defaultCurves(type) {
  return type === 'similarity' ? {shared: 0.5} : {Vince: 0.5, Kylie: 0.5};
}

function getCurveData(name) {
  if (!state.curves[name]) {
    const t = state.topics.find(t => t.name === name);
    state.curves[name] = defaultCurves(t ? t.type : 'interest');
  }
  return state.curves[name];
}

function topicScore(topic) {
  const cd = getCurveData(topic.name);
  if (topic.type === 'similarity') return cd.shared ?? 0.5;
  return interestScore(cd.Vince ?? 0.5, cd.Kylie ?? 0.5);
}

// ── Storage ───────────────────────────────────────────────────────────
function setStatus(msg, cls) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = cls || '';
}

async function loadFromBin() {
  setStatus('loading···', 'syncing');
  try {
    console.log('[jsonbin] loading from', BIN_URL + '/latest');
    const r = await fetch(BIN_URL + '/latest', {
      headers: {'X-Access-Key': ACCESS_KEY}
    });
    console.log('[jsonbin] load response:', r.status, r.statusText);
    const data = await r.json();
    console.log('[jsonbin] load payload:', data);
    if (!r.ok) {
      setStatus(`load ${r.status}`, 'error');
      return;
    }
    const saved = data.record;
    if (saved && saved.topics) {
      state.topics = saved.topics;
      state.curves = saved.curves || {};
    }
    setStatus('synced', 'saved');
    setTimeout(() => setStatus(''), 2000);
  } catch(e) {
    console.error('[jsonbin] load error:', e);
    setStatus('offline', 'error');
  }
}

async function saveToBin() {
  setStatus('saving···', 'syncing');
  try {
    const payload = {topics: state.topics, curves: state.curves};
    console.log('[jsonbin] saving to', BIN_URL, payload);
    const r = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Access-Key': ACCESS_KEY
      },
      body: JSON.stringify(payload)
    });
    console.log('[jsonbin] save response:', r.status, r.statusText);
    const data = await r.json();
    console.log('[jsonbin] save result:', data);
    if (!r.ok) {
      setStatus(`save ${r.status}`, 'error');
      return;
    }
    setStatus('saved', 'saved');
    setTimeout(() => setStatus(''), 2000);
  } catch(e) {
    console.error('[jsonbin] save error:', e);
    setStatus('save failed', 'error');
  }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToBin(), 1200);
}

// ── Mini canvas ───────────────────────────────────────────────────────
function drawMini(topic) {
  const key = topic.name.replace(/\s/g, '_');
  const canvas = document.getElementById('mini-' + key);
  if (!canvas) return;
  const cd = getCurveData(topic.name);
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height, n = 100;
  ctx.clearRect(0, 0, w, h);

  function drawCurve(pts, color, alpha) {
    ctx.beginPath();
    pts.forEach((y, i) => {
      const px = (i/(n-1))*w, py = h - 1 - y*(h-3);
      i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    });
    ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
    ctx.fillStyle = color + Math.round(alpha*255).toString(16).padStart(2,'0');
    ctx.fill();
    ctx.beginPath();
    pts.forEach((y, i) => {
      const px = (i/(n-1))*w, py = h - 1 - y*(h-3);
      i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    });
    ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
  }

  if (topic.type === 'similarity') {
    drawCurve(genPts(cd.shared ?? 0.5, SIGMA, n), OC, 0.25);
  } else {
    const vPts = genPts(cd.Vince ?? 0.5, SIGMA, n);
    const kPts = genPts(cd.Kylie ?? 0.5, SIGMA, n);
    drawCurve(vPts, VC, 0.2);
    drawCurve(kPts, KC, 0.2);
    const ov = vPts.map((v,i) => Math.min(v, kPts[i]));
    ctx.beginPath();
    ov.forEach((y,i) => {
      const px=(i/(n-1))*w, py=h-1-y*(h-3);
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    });
    ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath();
    ctx.fillStyle = OC + '55'; ctx.fill();
  }
}

function sizeMini(topic) {
  requestAnimationFrame(() => {
    const key = topic.name.replace(/\s/g, '_');
    const c = document.getElementById('mini-' + key);
    if (c) { c.width = c.offsetWidth || 200; drawMini(topic); }
  });
}

// ── Render columns ────────────────────────────────────────────────────
function renderColumn(type) {
  const listId = type === 'interest' ? 'intList' : 'simList';
  const list = document.getElementById(listId);
  if (!list) return;
  list.innerHTML = '';

  state.topics.filter(t => t.type === type).forEach(topic => {
    const cd = getCurveData(topic.name);
    const score = Math.round(topicScore(topic) * 100);
    const key = topic.name.replace(/\s/g, '_');

    let sliderHTML = '';
    if (type === 'similarity') {
      const val = Math.round((cd.shared ?? 0.5) * 100);
      sliderHTML = `
        <div class="slider-row">
          <input type="range" min="0" max="100" step="1" value="${val}"
            style="--slider-color:${OC};"
            oninput="onSim('${esc(topic.name)}',this.value/100)" />
          <span class="slider-val" id="sc-${key}" style="color:${OC};">${score}%</span>
        </div>`;
    } else {
      const vval = Math.round((cd.Vince ?? 0.5) * 100);
      const kval = Math.round((cd.Kylie ?? 0.5) * 100);
      sliderHTML = `
        <div class="slider-row">
          <span class="slider-label" style="color:${VC};">Vince</span>
          <input type="range" min="0" max="100" step="1" value="${vval}"
            style="--slider-color:${VC};"
            oninput="onInterest('${esc(topic.name)}','Vince',this.value/100)" />
          <span class="slider-val" id="vv-${key}">${Math.round((cd.Vince??0.5)*10)}</span>
        </div>
        <div class="slider-row">
          <span class="slider-label" style="color:${KC};">Kylie</span>
          <input type="range" min="0" max="100" step="1" value="${kval}"
            style="--slider-color:${KC};"
            oninput="onInterest('${esc(topic.name)}','Kylie',this.value/100)" />
          <span class="slider-val" id="kv-${key}">${Math.round((cd.Kylie??0.5)*10)}</span>
        </div>
        <div class="score-row">
          <span class="score-val" id="sc-${key}">${score}%</span>
        </div>`;
    }

    const div = document.createElement('div');
    div.className = 'topic-card';
    div.innerHTML = `
      <div class="topic-title-row">
        <span class="topic-name">${topic.name}</span>
        <button class="remove-btn" onclick="removeTopic('${esc(topic.name)}')">×</button>
      </div>
      <canvas class="mini" id="mini-${key}" height="40"></canvas>
      ${sliderHTML}
    `;
    list.appendChild(div);
    sizeMini(topic);
  });
}

function renderAll() {
  renderColumn('similarity');
  renderColumn('interest');
}

// ── Topic mutations ───────────────────────────────────────────────────
function addTopic(type) {
  const inp = document.getElementById(type === 'interest' ? 'newInt' : 'newSim');
  const val = inp.value.trim();
  if (!val || state.topics.find(t => t.name === val)) return;
  state.topics.push({name: val, type});
  state.curves[val] = defaultCurves(type);
  inp.value = '';
  renderColumn(type);
  scheduleViz();
  scheduleSave();
}

function removeTopic(name) {
  const topic = state.topics.find(t => t.name === name);
  const type = topic ? topic.type : 'interest';
  state.topics = state.topics.filter(t => t.name !== name);
  delete state.curves[name];
  renderColumn(type);
  scheduleViz();
  scheduleSave();
}

// ── Slider handlers ───────────────────────────────────────────────────
function onSim(name, val) {
  getCurveData(name).shared = val;
  const key = name.replace(/\s/g, '_');
  const sc = document.getElementById('sc-' + key);
  if (sc) sc.textContent = Math.round(val*100) + '%';
  const topic = state.topics.find(t => t.name === name);
  if (topic) { const c=document.getElementById('mini-'+key); if(c){c.width=c.offsetWidth||200;drawMini(topic);} }
  scheduleViz(); scheduleSave();
}

function onInterest(name, person, val) {
  getCurveData(name)[person] = val;
  const key = name.replace(/\s/g, '_');
  const el = document.getElementById((person==='Vince'?'vv':'kv') + '-' + key);
  if (el) el.textContent = Math.round(val * 10);
  const topic = state.topics.find(t => t.name === name);
  if (topic) {
    const sc = document.getElementById('sc-' + key);
    if (sc) sc.textContent = Math.round(topicScore(topic)*100) + '%';
    const c = document.getElementById('mini-' + key);
    if (c) { c.width = c.offsetWidth||200; drawMini(topic); }
  }
  scheduleViz(); scheduleSave();
}

// ── Chart ─────────────────────────────────────────────────────────────
function getSumData() {
  const n = 120;
  const xs = Array.from({length:n}, (_, i) => i/(n-1));
  const sumY = new Array(n).fill(0);
  state.topics.forEach(topic => {
    const s = topicScore(topic);
    const w = 1 + 1.5 * (1 - Math.abs(s - 0.5) * 2);
    const sigma = topic.type === 'similarity' ? SIM_SUM_SIGMA : SUM_SIGMA;
    xs.forEach((x, i) => { sumY[i] += w * gauss(x, s, sigma); });
  });
  return {xs, sumY};
}

function scheduleViz() {
  clearTimeout(vizTimer);
  vizTimer = setTimeout(() => updateChart(), 150);
}

function initChart() {
  const canvas = document.getElementById('sumChart');
  if (!canvas || !window.Chart) return;
  const {xs, sumY} = getSumData();

  sumChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels: xs.map((_,i) => i),
      datasets: [{
        data: sumY,
        borderColor: OC,
        backgroundColor: 'transparent',
        fill: true,
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {legend:{display:false}, tooltip:{enabled:false}},
      scales: {x:{display:false}, y:{display:false, min:0}}
    },
    plugins: [{
      afterLayout(chart) {
        const {left, right} = chart.chartArea;
        const grad = chart.ctx.createLinearGradient(left, 0, right, 0);
        grad.addColorStop(0,   VC + '99');
        grad.addColorStop(0.5, OC + '99');
        grad.addColorStop(1,   KC + '99');
        chart.data.datasets[0].backgroundColor = grad;
      }
    }]
  });
}

function updateChart() {
  if (!sumChart) return;
  const {sumY} = getSumData();
  sumChart.data.datasets[0].data = sumY;
  sumChart.update('none');
}

// ── Keyboard shortcuts ────────────────────────────────────────────────
document.getElementById('newSim').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTopic('similarity');
});
document.getElementById('newInt').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTopic('interest');
});

// ── Init ──────────────────────────────────────────────────────────────
async function init() {
  await loadFromBin();
  renderAll();
  requestAnimationFrame(() => initChart());
}

init();
</script>
</body>
</html>
